<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bombdrilo.hook</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --green:#48d85b;
    --green2:#82ff95;
}

body{

    overflow:hidden;
    height:100vh;

    font-family:
    Inter,
    Arial,
    sans-serif;

    background:
    radial-gradient(circle at top left, rgba(72,216,91,.12), transparent 20%),
    radial-gradient(circle at bottom right, rgba(72,216,91,.10), transparent 22%),
    #020503;

    color:white;
}

/* GRID */

.grid{

    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(72,216,91,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(72,216,91,.025) 1px, transparent 1px);

    background-size:42px 42px;

    mask-image:
    radial-gradient(circle, black 20%, transparent 82%);
}

/* MOUSE GLOW */

.mouse{

    position:fixed;

    width:700px;
    height:700px;

    border-radius:50%;

    pointer-events:none;

    background:
    radial-gradient(circle,
    rgba(72,216,91,.08),
    transparent 65%);

    filter:blur(35px);

    transform:
    translate(-50%, -50%);

    z-index:0;
}

/* FLOATERS */

.glow{

    position:fixed;

    width:400px;
    height:400px;

    border-radius:50%;

    filter:blur(120px);

    opacity:.08;

    animation:float 10s infinite alternate ease-in-out;
}

.glow.left{

    top:-120px;
    left:-120px;

    background:#48d85b;
}

.glow.right{

    bottom:-120px;
    right:-120px;

    background:#48d85b;

    animation-delay:2s;
}

@keyframes float{

    from{
        transform:
        translateY(0px)
        scale(1);
    }

    to{
        transform:
        translateY(40px)
        scale(1.08);
    }

}

/* PARTICLES */

.particles{

    position:fixed;
    inset:0;

    overflow:hidden;

    pointer-events:none;
}

.particles span{

    position:absolute;

    width:3px;
    height:3px;

    border-radius:50%;

    background:#dfffe5;

    opacity:.6;

    box-shadow:
    0 0 10px #48d85b;

    animation:fall linear infinite;
}

@keyframes fall{

    0%{
        transform:
        translateY(-10vh)
        translateX(0px);

        opacity:0;
    }

    10%{
        opacity:.7;
    }

    100%{
        transform:
        translateY(110vh)
        translateX(40px);

        opacity:0;
    }

}

/* MAIN */

.wrap{

    position:relative;
    z-index:5;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:35px;
}

/* CARD */

.card{

    position:relative;

    width:min(86vw, 1000px);

    padding:
    clamp(45px,5vw,75px);

    border-radius:40px;

    text-align:center;

    background:
    rgba(3,10,5,.72);

    border:
    1px solid rgba(72,216,91,.10);

    backdrop-filter:
    blur(30px);

    box-shadow:
    0 0 90px rgba(0,0,0,.72),
    0 0 80px rgba(72,216,91,.05);

    overflow:hidden;
}

.card::before{

    content:"";

    position:absolute;
    inset:0;

    border-radius:inherit;

    padding:1px;

    background:
    linear-gradient(
        135deg,
        rgba(72,216,91,.18),
        transparent,
        rgba(72,216,91,.08)
    );

    -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;

    pointer-events:none;
}

/* BADGE */

.badge{

    display:inline-flex;

    align-items:center;
    gap:10px;

    padding:
    12px 22px;

    border-radius:999px;

    background:
    rgba(255,255,255,.02);

    border:
    1px solid rgba(72,216,91,.08);

    color:#dfffe5;

    font-size:14px;

    margin-bottom:50px;
}

.dot{

    width:8px;
    height:8px;

    border-radius:50%;

    background:#48d85b;

    box-shadow:
    0 0 14px #48d85b;
}

/* TITLE */

h1{

    font-size:
    clamp(46px, 6vw, 92px);

    line-height:.92;

    letter-spacing:-5px;

    margin-bottom:38px;

    font-weight:900;

    word-break:break-word;

    overflow-wrap:anywhere;

    background:
    linear-gradient(
        90deg,
        #ffffff 0%,
        #9fffad 18%,
        #48d85b 38%,
        #1e6d2b 50%,
        #6eff83 68%,
        #ffffff 100%
    );

    background-size:220% auto;

    animation:
    titleMove 7s linear infinite;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    filter:
    drop-shadow(0 0 12px rgba(72,216,91,.18));
}

@keyframes titleMove{

    0%{
        background-position:0% center;
    }

    100%{
        background-position:220% center;
    }

}

/* DESCRIPTION */

.desc{

    font-size:
    clamp(18px,1.7vw,24px);

    line-height:1.55;

    color:#879288;

    margin-bottom:55px;
}

.desc span{
    color:#59ef72;
}

/* BUTTON */

button{

    width:100%;

    padding:
    28px;

    border-radius:28px;

    border:
    1px solid rgba(72,216,91,.30);

    background:
    rgba(0,0,0,.18);

    color:#87ff9b;

    font-size:
    clamp(24px,2vw,34px);

    font-weight:800;

    cursor:pointer;

    transition:.25s ease;

    box-shadow:
    0 0 45px rgba(72,216,91,.08);
}

button:hover{

    transform:
    translateY(-2px)
    scale(1.01);

    border-color:
    rgba(72,216,91,.65);

    box-shadow:
    0 0 70px rgba(72,216,91,.18),
    0 15px 40px rgba(0,0,0,.4);
}

/* FOOTER */

.footer{

    margin-top:36px;

    color:#59635a;

    font-size:18px;
}

/* CROCODILE EMOJIS */

.crocs{

    position:fixed;
    inset:0;

    pointer-events:none;
    overflow:hidden;
}

.croc{

    position:absolute;

    font-size:28px;

    opacity:.12;

    animation:
    crocFloat linear infinite;
}

@keyframes crocFloat{

    0%{
        transform:
        translateY(110vh)
        rotate(0deg);

        opacity:0;
    }

    15%{
        opacity:.12;
    }

    100%{
        transform:
        translateY(-20vh)
        rotate(360deg);

        opacity:0;
    }

}

/* MOBILE */

@media(max-width:700px){

    .card{
        padding:38px 22px;
    }

    h1{
        letter-spacing:-2px;
    }

}

</style>
</head>
