<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bombdrilo.hook</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --green:#48d85b;
}

html,
body{

    width:100%;
    height:100%;

    overflow:hidden;

    font-family:
    Inter,
    Arial,
    sans-serif;

    background:
    radial-gradient(circle at top left, rgba(72,216,91,.12), transparent 18%),
    radial-gradient(circle at bottom right, rgba(72,216,91,.10), transparent 22%),
    #020503;

    color:white;
}

/* BACKGROUND */

body::before{

    content:"";

    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at center, rgba(72,216,91,.06), transparent 45%);

    z-index:0;
}

.grid{

    position:fixed;
    inset:0;

    z-index:1;

    background-image:
    linear-gradient(rgba(72,216,91,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(72,216,91,.02) 1px, transparent 1px);

    background-size:42px 42px;

    mask-image:
    radial-gradient(circle, black 25%, transparent 82%);
}

/* MOUSE GLOW */

.mouse{

    position:fixed;

    width:700px;
    height:700px;

    border-radius:50%;

    pointer-events:none;

    background:
    radial-gradient(circle,
    rgba(72,216,91,.08),
    transparent 65%);

    transform:
    translate(-50%, -50%);

    filter:blur(35px);

    z-index:2;
}

/* PARTICLES */

.particles{

    position:fixed;
    inset:0;

    overflow:hidden;

    pointer-events:none;

    z-index:2;
}

.particles span{

    position:absolute;

    width:3px;
    height:3px;

    border-radius:50%;

    background:#dfffe5;

    opacity:.6;

    box-shadow:
    0 0 10px #48d85b;

    animation:fall linear infinite;
}

@keyframes fall{

    0%{
        transform:
        translateY(110vh)
        translateX(0px);

        opacity:0;
    }

    15%{
        opacity:.7;
    }

    100%{
        transform:
        translateY(-20vh)
        translateX(40px);

        opacity:0;
    }

}

/* MAIN */

.wrap{

    position:relative;

    z-index:5;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;
}

/* CARD */

.card{

    position:relative;

    width:min(84vw, 1000px);

    padding:
    clamp(45px,5vw,75px);

    border-radius:42px;

    text-align:center;

    background:
    rgba(3,10,5,.72);

    border:
    1px solid rgba(72,216,91,.12);

    backdrop-filter:
    blur(30px);

    box-shadow:
    0 0 90px rgba(0,0,0,.72),
    0 0 60px rgba(72,216,91,.05);

    overflow:hidden;
}

/* TITLE */

h1{

    font-size:
    clamp(48px, 6vw, 96px);

    line-height:.92;

    letter-spacing:-5px;

    margin-bottom:38px;

    font-weight:900;

    background:
    linear-gradient(
        90deg,
        #ffffff 0%,
        #9fffad 18%,
        #48d85b 38%,
        #1d6628 50%,
        #65ff80 68%,
        #ffffff 100%
    );

    background-size:220% auto;

    animation:
    titleMove 7s linear infinite;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    filter:
    drop-shadow(0 0 12px rgba(72,216,91,.18));
}

@keyframes titleMove{

    0%{
        background-position:0% center;
    }

    100%{
        background-position:220% center;
    }

}

/* DESC */

.desc{

    font-size:
    clamp(18px,1.7vw,24px);

    line-height:1.55;

    color:#879288;

    margin-bottom:55px;
}

.desc span{
    color:#59ef72;
}

/* BUTTON */

button{

    width:100%;

    padding:
    28px;

    border-radius:28px;

    border:
    1px solid rgba(72,216,91,.30);

    background:
    rgba(0,0,0,.18);

    color:#87ff9b;

    font-size:
    clamp(24px,2vw,34px);

    font-weight:800;

    cursor:pointer;

    transition:.25s ease;

    box-shadow:
    0 0 45px rgba(72,216,91,.08);
}

button:hover{

    transform:
    translateY(-2px)
    scale(1.01);

    border-color:
    rgba(72,216,91,.65);

    box-shadow:
    0 0 70px rgba(72,216,91,.18),
    0 15px 40px rgba(0,0,0,.4);
}

/* FOOTER */

.footer{

    margin-top:36px;

    color:#59635a;

    font-size:18px;
}

/* MOBILE */

@media(max-width:700px){

    .card{
        padding:38px 22px;
    }

    h1{
        letter-spacing:-2px;
    }

}

</style>
</head>

<body>

<div class="grid"></div>

<div class="mouse" id="mouse"></div>

<div class="particles">

<span style="left:5%; animation-duration:9s;"></span>
<span style="left:13%; animation-duration:12s;"></span>
<span style="left:21%; animation-duration:10s;"></span>
<span style="left:29%; animation-duration:14s;"></span>
<span style="left:37%; animation-duration:11s;"></span>
<span style="left:45%; animation-duration:15s;"></span>
<span style="left:53%; animation-duration:9s;"></span>
<span style="left:61%; animation-duration:13s;"></span>
<span style="left:69%; animation-duration:10s;"></span>
<span style="left:77%; animation-duration:14s;"></span>
<span style="left:85%; animation-duration:11s;"></span>
<span style="left:93%; animation-duration:15s;"></span>

</div>

<div class="wrap">

<div class="card">

<h1>
bombdrilo.hook
</h1>

<div class="desc">

premium fallen script<br>
by the owners of <span>NHACK</span>

</div>

<button id="buy-btn">

launch

</button>

<div class="footer">

bombardino.online

</div>

</div>

</div>

<script>

/* MOUSE GLOW */

const mouse = document.getElementById("mouse");

document.addEventListener("mousemove",(e)=>{

    mouse.style.left = e.clientX + "px";
    mouse.style.top = e.clientY + "px";

});

/* BUTTON EFFECT */

const btn = document.getElementById("buy-btn");

btn.addEventListener("click", () => {

    /* HIDE CURSOR */

    document.body.style.cursor = "none";

    /* RAINBOW FLASH */

    const flash = document.createElement("div");

    flash.style.position = "fixed";
    flash.style.inset = "0";
    flash.style.zIndex = "999999";
    flash.style.pointerEvents = "none";

    flash.style.background = `
        linear-gradient(
            90deg,
            #ff0000,
            #ff8800,
            #ffee00,
            #00ff66,
            #00ffff,
            #0044ff,
            #aa00ff,
            #ff0066
        )
    `;

    flash.style.backgroundSize = "500% 500%";

    flash.style.mixBlendMode = "screen";

    flash.style.opacity = "0";

    flash.style.animation = `
        rainbowMove .08s linear infinite,
        rainbowOpacity .08s linear infinite
    `;

    document.body.appendChild(flash);

    /* TITLE POPUP */

    const popup = document.createElement("div");

    popup.innerText = "bombdrilo hook";

    popup.style.position = "fixed";

    popup.style.top = "50%";
    popup.style.left = "50%";

    popup.style.transform =
    "translate(-50%,-50%) scale(.6)";

    popup.style.fontSize = "92px";
    popup.style.fontWeight = "900";

    popup.style.letterSpacing = "-5px";

    popup.style.color = "#ffffff";

    popup.style.textShadow = `
        0 0 25px #48d85b,
        0 0 80px #48d85b,
        0 0 120px #48d85b
    `;

    popup.style.zIndex = "1000000";

    popup.style.opacity = "0";

    popup.style.transition =
    ".2s ease";

    popup.style.fontFamily =
    "Inter, sans-serif";

    document.body.appendChild(popup);

    requestAnimationFrame(() => {

        popup.style.opacity = "1";

        popup.style.transform =
        "translate(-50%,-50%) scale(1)";

    });

    /* SCREEN SHAKE */

    let shake = setInterval(() => {

        document.body.style.transform = `
            translate(
                ${Math.random() * 12 - 6}px,
                ${Math.random() * 12 - 6}px
            )
        `;

    }, 35);

    /* CROCODILE EMOJIS */

    for(let i = 0; i < 30; i++){

        const croc = document.createElement("div");

        croc.innerText = "🐊";

        croc.style.position = "fixed";

        croc.style.left =
        Math.random() * 100 + "vw";

        croc.style.top = "-10vh";

        croc.style.fontSize =
        25 + Math.random() * 60 + "px";

        croc.style.zIndex = "999999";

        croc.style.opacity = ".9";

        croc.style.pointerEvents = "none";

        croc.style.transition =
        "transform 5s linear, opacity 5s linear";

        document.body.appendChild(croc);

        requestAnimationFrame(() => {

            croc.style.transform = `
                translateY(120vh)
                rotate(${Math.random() * 720}deg)
            `;

            croc.style.opacity = "0";

        });

        setTimeout(() => {

            croc.remove();

        }, 5000);

    }

    /* REMOVE */

    setTimeout(() => {

        clearInterval(shake);

        document.body.style.transform = "";

        flash.remove();

        popup.style.opacity = "0";

        popup.style.transform =
        "translate(-50%,-50%) scale(.85)";

        setTimeout(() => {

            popup.remove();

        }, 250);

        document.body.style.cursor = "";

    }, 5000);

});

/* FLASH ANIMS */

const style = document.createElement("style");

style.innerHTML = `

@keyframes rainbowMove{

    0%{
        background-position:0% 50%;
    }

    100%{
        background-position:500% 50%;
    }

}

@keyframes rainbowOpacity{

    0%{
        opacity:.15;
    }

    50%{
        opacity:.85;
    }

    100%{
        opacity:.15;
    }

}

`;

document.head.appendChild(style);

</script>

</body>
</html>
