<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>bombdrilo.hook</title>
<meta name="theme-color" content="#020604" />

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --bg: #020604;
    --panel: rgba(2, 10, 6, 0.74);
    --green: #54d96d;
    --green-soft: #8af59d;
    --green-dark: #1b5f2d;
    --muted: #8a968c;
}

html,
body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Inter, Arial, Helvetica, sans-serif;
    background: #020604;
    color: white;
}

/* BACKGROUND */

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 9% 12%, rgba(67, 185, 83, 0.22), transparent 18%),
        radial-gradient(circle at 91% 85%, rgba(55, 170, 74, 0.2), transparent 20%),
        radial-gradient(circle at 50% 45%, rgba(35, 90, 48, 0.22), transparent 45%),
        linear-gradient(135deg, #020604, #031008 55%, #000);
    z-index: 0;
}

.grid {
    position: fixed;
    inset: 0;
    z-index: 1;
    background-image:
        linear-gradient(rgba(95, 255, 130, 0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(95, 255, 130, 0.028) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(circle, black 20%, transparent 82%);
}

.mouse-glow {
    position: fixed;
    width: 520px;
    height: 520px;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(circle, rgba(72, 200, 91, 0.12), transparent 68%);
    filter: blur(30px);
    transform: translate(-50%, -50%);
    z-index: 2;
}

/* PARTICLES */

.particles {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    overflow: hidden;
}

.particles span {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #8cf59f;
    opacity: 0.55;
    box-shadow: 0 0 12px rgba(91, 230, 112, 0.9);
    animation: drift linear infinite;
}

@keyframes drift {
    0% {
        transform: translateY(110vh) translateX(0);
        opacity: 0;
    }

    20% {
        opacity: 0.55;
    }

    100% {
        transform: translateY(-15vh) translateX(45px);
        opacity: 0;
    }
}

/* PAGE */

.wrap {
    position: relative;
    z-index: 5;
    width: 100%;
    height: 100vh;
    display: grid;
    place-items: center;
    padding: 34px;
}

/* CARD */

.card {
    width: min(82vw, 1040px);
    min-height: min(72vh, 690px);
    padding: clamp(42px, 5vw, 70px);
    border-radius: 42px;
    text-align: center;
    background: var(--panel);
    border: 1px solid rgba(104, 235, 126, 0.22);
    box-shadow:
        0 0 90px rgba(0, 0, 0, 0.78),
        0 0 80px rgba(56, 190, 73, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.035);
    backdrop-filter: blur(28px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
}

/* BADGE */

.badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    width: fit-content;
    margin: 0 auto clamp(42px, 5vw, 68px);
    padding: 12px 22px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.025);
    border: 1px solid rgba(110, 235, 130, 0.13);
    color: #b9ffc6;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 0 28px rgba(67, 210, 88, 0.05);
}

.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #5cef78;
    box-shadow: 0 0 16px rgba(92, 239, 120, 0.95);
}

/* TITLE */

h1 {
    font-size: clamp(42px, 6.15vw, 88px);
    line-height: 0.96;
    letter-spacing: -4.5px;
    font-weight: 900;
    white-space: nowrap;
    margin-bottom: clamp(34px, 4vw, 52px);

    background:
        linear-gradient(
            105deg,
            #d9ffe0 0%,
            #92f0a2 18%,
            #43bd55 38%,
            #206f32 52%,
            #65d878 66%,
            #d5ffdc 82%,
            #3bbd50 100%
        );
    background-size: 220% auto;

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    filter:
        drop-shadow(0 14px 18px rgba(0, 0, 0, 0.45))
        drop-shadow(0 0 14px rgba(70, 205, 88, 0.12));

    animation: titleGradient 7s linear infinite;
}

@keyframes titleGradient {
    0% {
        background-position: 0% center;
    }

    100% {
        background-position: 220% center;
    }
}

/* DESCRIPTION */

.desc {
    color: var(--muted);
    font-size: clamp(18px, 1.8vw, 25px);
    line-height: 1.55;
    margin-bottom: clamp(44px, 5vw, 64px);
}

.desc span {
    color: #58ef74;
}

/* BUTTON */

button {
    width: min(100%, 860px);
    margin: 0 auto;
    padding: clamp(22px, 2.5vw, 30px);
    border-radius: 28px;
    border: 1px solid rgba(86, 225, 105, 0.54);
    background:
        linear-gradient(180deg, rgba(7, 21, 10, 0.7), rgba(1, 8, 4, 0.9));
    color: #67eb7d;
    font-size: clamp(26px, 2.7vw, 38px);
    font-weight: 900;
    cursor: pointer;
    box-shadow:
        0 0 42px rgba(66, 205, 83, 0.14),
        inset 0 0 24px rgba(75, 210, 88, 0.035);
    transition: 0.22s ease;
}

button:hover {
    transform: translateY(-2px) scale(1.006);
    border-color: rgba(111, 255, 135, 0.78);
    color: #94ffa6;
    box-shadow:
        0 0 70px rgba(66, 205, 83, 0.22),
        0 18px 50px rgba(0, 0, 0, 0.45);
}

/* FOOTER */

.footer {
    margin-top: clamp(34px, 4vw, 48px);
    color: #677069;
    font-size: clamp(15px, 1.5vw, 20px);
}

/* RESPONSIVE FIX */

@media (max-width: 900px) {
    .card {
        width: min(92vw, 760px);
        min-height: auto;
    }

    h1 {
        white-space: normal;
        font-size: clamp(40px, 11vw, 76px);
        letter-spacing: -3px;
    }
}

@media (max-width: 520px) {
    .wrap {
        padding: 18px;
    }

    .card {
        width: 94vw;
        padding: 36px 20px;
        border-radius: 30px;
    }

    h1 {
        font-size: clamp(36px, 12vw, 58px);
        letter-spacing: -2px;
    }

    .badge {
        margin-bottom: 34px;
    }
}
</style>
</head>

<body>

<div class="grid"></div>
<div class="mouse-glow" id="mouseGlow"></div>

<div class="particles">
    <span style="left:4%; animation-duration:19s; animation-delay:-3s;"></span>
    <span style="left:12%; animation-duration:23s; animation-delay:-8s;"></span>
    <span style="left:21%; animation-duration:18s; animation-delay:-5s;"></span>
    <span style="left:31%; animation-duration:25s; animation-delay:-12s;"></span>
    <span style="left:42%; animation-duration:20s; animation-delay:-7s;"></span>
    <span style="left:53%; animation-duration:27s; animation-delay:-15s;"></span>
    <span style="left:64%; animation-duration:21s; animation-delay:-4s;"></span>
    <span style="left:76%; animation-duration:24s; animation-delay:-10s;"></span>
    <span style="left:87%; animation-duration:19s; animation-delay:-6s;"></span>
    <span style="left:96%; animation-duration:26s; animation-delay:-14s;"></span>
</div>

<main class="wrap">
    <section class="card">

        <div class="badge">
            <div class="dot"></div>
            secure access
        </div>

        <h1>bombdrilo.hook</h1>

        <div class="desc">
            premium fallen script<br>
            by the owners of <span>NHACK</span>
        </div>

        <button id="buy-btn">launch</button>

        <div class="footer">
            bombardino.online
        </div>

    </section>
</main>

<script>
const glow = document.getElementById("mouseGlow");

window.addEventListener("mousemove", function(e) {
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});
</script>

<!-- Keep this if your button needs your separate JS file -->
<script src="script.js"></script>

</body>
</html>
