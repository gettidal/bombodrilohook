<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;

    font-family:
    Inter,
    Arial,
    sans-serif;

    background:
    radial-gradient(circle at top left, rgba(86,255,126,.15), transparent 25%),
    radial-gradient(circle at bottom right, rgba(86,255,126,.12), transparent 25%),
    #020403;

    color:white;
}

/* GRID */

.grid{
    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(90,255,120,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(90,255,120,.045) 1px, transparent 1px);

    background-size:48px 48px;

    mask-image:
    radial-gradient(circle, black, transparent 85%);
}

/* FLOATING GLOWS */

.glow{
    position:fixed;

    width:500px;
    height:500px;

    border-radius:50%;

    filter:blur(120px);

    opacity:.18;

    animation:float 10s ease-in-out infinite alternate;
}

.glow.left{
    top:-200px;
    left:-150px;

    background:#61ff92;
}

.glow.right{
    bottom:-200px;
    right:-150px;

    background:#61ff92;

    animation-delay:2s;
}

@keyframes float{
    from{
        transform:
        translateY(0px)
        scale(1);
    }

    to{
        transform:
        translateY(50px)
        scale(1.12);
    }
}

/* SNOW */

.snow{
    position:fixed;
    inset:0;

    pointer-events:none;
    overflow:hidden;
}

.snow span{
    position:absolute;

    width:4px;
    height:4px;

    border-radius:50%;

    background:#e7ffee;

    opacity:.8;

    box-shadow:
    0 0 10px #61ff92;

    animation:fall linear infinite;
}

@keyframes fall{

    0%{
        transform:
        translateY(-10vh)
        translateX(0px);

        opacity:0;
    }

    10%{
        opacity:.9;
    }

    100%{
        transform:
        translateY(110vh)
        translateX(50px);

        opacity:0;
    }

}

/* MAIN */

.wrap{
    position:relative;
    z-index:10;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

/* CARD */

.card{

    position:relative;

    width:min(92vw, 850px);

    padding:
    clamp(40px, 5vw, 70px);

    border-radius:42px;

    text-align:center;

    background:
    rgba(5,12,8,.72);

    border:
    1px solid rgba(120,255,160,.14);

    backdrop-filter:
    blur(30px);

    box-shadow:
    0 0 100px rgba(0,0,0,.7),
    inset 0 1px 0 rgba(255,255,255,.04);
}

/* BADGE */

.badge{
    display:inline-flex;

    align-items:center;
    gap:10px;

    padding:
    12px 20px;

    border-radius:999px;

    background:
    rgba(255,255,255,.04);

    border:
    1px solid rgba(120,255,160,.12);

    color:#9cffb9;

    font-size:14px;

    margin-bottom:38px;
}

.dot{
    width:8px;
    height:8px;

    border-radius:50%;

    background:#61ff92;

    box-shadow:
    0 0 15px #61ff92;
}

/* TITLE */

h1{

    font-size:
    clamp(52px, 9vw, 120px);

    line-height:.9;

    letter-spacing:-5px;

    margin-bottom:30px;

    white-space:nowrap;

    background:
    linear-gradient(
        90deg,
        #ffffff,
        #8dffaf,
        #ffffff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* DESCRIPTION */

.desc{
    font-size:
    clamp(18px,2vw,22px);

    line-height:1.5;

    color:#8d9d91;

    margin-bottom:45px;
}

.desc span{
    color:#71ff9d;
}

/* BUTTON */

button{

    position:relative;

    width:100%;

    padding:
    28px;

    border-radius:28px;

    border:
    2px solid rgba(97,255,146,.65);

    background:
    rgba(0,0,0,.25);

    color:#83ffab;

    font-size:
    clamp(24px,2vw,34px);

    font-weight:700;

    cursor:pointer;

    overflow:hidden;

    transition:.25s ease;

    box-shadow:
    0 0 35px rgba(97,255,146,.18),
    inset 0 0 20px rgba(97,255,146,.05);
}

button:hover{

    transform:
    translateY(-3px)
    scale(1.01);

    box-shadow:
    0 0 60px rgba(97,255,146,.3),
    0 15px 40px rgba(0,0,0,.4);

    border-color:
    rgba(97,255,146,.9);
}

.arrow{
    position:absolute;

    right:35px;
    top:50%;

    transform:translateY(-50%);

    font-size:32px;

    color:#7cffaa;
}

/* FOOTER */

.footer{
    margin-top:38px;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;

    color:#6d7d72;

    font-size:20px;
}

.line{
    width:120px;
    height:1px;

    background:
    rgba(120,255,160,.15);
}

.leaf{
    color:#7cffaa;
}

</style>
</head>
