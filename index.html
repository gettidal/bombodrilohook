<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>bombdrilo.hook</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --green:#6dff98;
}

body{

    overflow:hidden;
    height:100vh;

    font-family:
    Inter,
    Arial,
    sans-serif;

    background:
    radial-gradient(circle at top left, rgba(109,255,152,.07), transparent 22%),
    radial-gradient(circle at bottom right, rgba(109,255,152,.06), transparent 22%),
    #020403;

    color:white;
}

/* GRID */

.grid{

    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(109,255,152,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(109,255,152,.025) 1px, transparent 1px);

    background-size:42px 42px;

    mask-image:
    radial-gradient(circle, black, transparent 82%);
}

/* MOUSE LIGHT */

.mouse{

    position:fixed;

    width:650px;
    height:650px;

    border-radius:50%;

    pointer-events:none;

    background:
    radial-gradient(circle,
    rgba(109,255,152,.06),
    transparent 65%);

    filter:blur(30px);

    transform:
    translate(-50%, -50%);

    z-index:0;
}

/* BG GLOWS */

.glow{

    position:fixed;

    width:400px;
    height:400px;

    border-radius:50%;

    filter:blur(120px);

    opacity:.08;

    animation:float 10s infinite alternate ease-in-out;
}

.glow.left{

    top:-120px;
    left:-120px;

    background:#6dff98;
}

.glow.right{

    bottom:-120px;
    right:-120px;

    background:#6dff98;

    animation-delay:2s;
}

@keyframes float{

    from{
        transform:
        translateY(0px)
        scale(1);
    }

    to{
        transform:
        translateY(40px)
        scale(1.08);
    }

}

/* PARTICLES */

.particles{

    position:fixed;
    inset:0;

    overflow:hidden;

    pointer-events:none;
}

.particles span{

    position:absolute;

    width:3px;
    height:3px;

    border-radius:50%;

    background:#eafff0;

    opacity:.65;

    box-shadow:
    0 0 8px #6dff98;

    animation:fall linear infinite;
}

@keyframes fall{

    0%{
        transform:
        translateY(-10vh)
        translateX(0px);

        opacity:0;
    }

    10%{
        opacity:.7;
    }

    100%{
        transform:
        translateY(110vh)
        translateX(40px);

        opacity:0;
    }

}

/* MAIN */

.wrap{

    position:relative;
    z-index:5;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;
}

/* CARD */

.card{

    position:relative;

    width:min(88vw, 1050px);

    padding:
    clamp(45px,5vw,70px);

    border-radius:38px;

    text-align:center;

    background:
    rgba(5,12,8,.60);

    border:
    1px solid rgba(109,255,152,.08);

    backdrop-filter:
    blur(24px);

    box-shadow:
    0 0 80px rgba(0,0,0,.65),
    inset 0 1px 0 rgba(255,255,255,.025);

    overflow:hidden;
}

.card::before{

    content:"";

    position:absolute;
    inset:0;

    border-radius:inherit;

    padding:1px;

    background:
    linear-gradient(
        135deg,
        rgba(109,255,152,.18),
        transparent,
        rgba(109,255,152,.10)
    );

    -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;

    pointer-events:none;
}

/* BADGE */

.badge{

    display:inline-flex;

    align-items:center;
    gap:10px;

    padding:
    11px 20px;

    border-radius:999px;

    background:
    rgba(255,255,255,.025);

    border:
    1px solid rgba(109,255,152,.07);

    color:#d8ffe5;

    font-size:14px;

    margin-bottom:45px;
}

.dot{

    width:8px;
    height:8px;

    border-radius:50%;

    background:#6dff98;

    box-shadow:
    0 0 12px #6dff98;
}

/* TITLE */

h1{

    font-size:
    clamp(42px, 6vw, 96px);

    line-height:.92;

    letter-spacing:-4px;

    margin-bottom:35px;

    word-break:break-word;

    overflow-wrap:anywhere;

    font-weight:800;

    background:
    linear-gradient(
        90deg,
        #ffffff 0%,
        #eafff0 28%,
        #a7ffbf 50%,
        #ffffff 72%
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 30px rgba(109,255,152,.04);
}

/* DESC */

.desc{

    font-size:
    clamp(18px,1.7vw,24px);

    line-height:1.55;

    color:#89948d;

    margin-bottom:50px;
}

.desc span{
    color:#72ff9f;
}

/* BUTTON */

button{

    position:relative;

    width:100%;

    padding:
    26px;

    border-radius:26px;

    border:
    1px solid rgba(109,255,152,.38);

    background:
    rgba(0,0,0,.22);

    color:#8effb3;

    font-size:
    clamp(22px,2vw,34px);

    font-weight:700;

    cursor:pointer;

    transition:.25s ease;

    box-shadow:
    0 0 40px rgba(109,255,152,.10),
    inset 0 0 20px rgba(109,255,152,.03);
}

button:hover{

    transform:
    translateY(-2px)
    scale(1.01);

    border-color:
    rgba(109,255,152,.65);

    box-shadow:
    0 0 70px rgba(109,255,152,.18),
    0 15px 40px rgba(0,0,0,.4);
}

/* FOOTER */

.footer{

    margin-top:34px;

    color:#5f6b63;

    font-size:18px;
}

/* MOBILE */

@media(max-width:700px){

    .card{
        padding:38px 22px;
    }

    h1{
        letter-spacing:-2px;
    }

}

</style>
</head>
