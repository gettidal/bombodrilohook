<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>bombdrilo.hook</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --green:#72ff9f;
    --green2:#b7ffcb;
}

body{
    overflow:hidden;
    height:100vh;

    background:
    radial-gradient(circle at top left, rgba(114,255,159,.10), transparent 20%),
    radial-gradient(circle at bottom right, rgba(114,255,159,.08), transparent 20%),
    #020403;

    font-family:
    Inter,
    Arial,
    sans-serif;

    color:white;
}

/* GRID */

.grid{
    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(114,255,159,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(114,255,159,.03) 1px, transparent 1px);

    background-size:42px 42px;

    mask-image:
    radial-gradient(circle, black, transparent 80%);
}

/* MOUSE GLOW */

.mouse-glow{
    position:fixed;

    width:550px;
    height:550px;

    border-radius:50%;

    pointer-events:none;

    background:
    radial-gradient(circle,
    rgba(114,255,159,.11),
    transparent 65%);

    transform:
    translate(-50%, -50%);

    filter:blur(25px);

    z-index:0;
}

/* FLOATERS */

.glow{
    position:fixed;

    width:400px;
    height:400px;

    border-radius:50%;

    filter:blur(120px);

    opacity:.13;

    animation:float 10s infinite alternate ease-in-out;
}

.glow.left{
    top:-120px;
    left:-120px;

    background:#72ff9f;
}

.glow.right{
    bottom:-120px;
    right:-120px;

    background:#72ff9f;

    animation-delay:2s;
}

@keyframes float{

    from{
        transform:
        translateY(0px)
        scale(1);
    }

    to{
        transform:
        translateY(40px)
        scale(1.08);
    }

}

/* PARTICLES */

.particles{
    position:fixed;
    inset:0;

    overflow:hidden;

    pointer-events:none;
}

.particles span{
    position:absolute;

    width:4px;
    height:4px;

    border-radius:50%;

    background:#dfffe8;

    opacity:.8;

    box-shadow:
    0 0 10px #72ff9f;

    animation:fall linear infinite;
}

@keyframes fall{

    0%{
        transform:
        translateY(-10vh)
        translateX(0px);

        opacity:0;
    }

    10%{
        opacity:.8;
    }

    100%{
        transform:
        translateY(110vh)
        translateX(50px);

        opacity:0;
    }

}

/* MAIN */

.wrap{
    position:relative;
    z-index:5;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

/* CARD */

.card{

    position:relative;

    width:min(92vw, 950px);

    padding:
    clamp(40px,5vw,70px);

    border-radius:42px;

    text-align:center;

    background:
    rgba(5,12,8,.70);

    border:
    1px solid rgba(114,255,159,.10);

    backdrop-filter:
    blur(26px);

    box-shadow:
    0 0 100px rgba(0,0,0,.7),
    inset 0 1px 0 rgba(255,255,255,.03);

    overflow:hidden;
}

/* BORDER SHINE */

.card::before{

    content:"";

    position:absolute;
    inset:0;

    border-radius:inherit;

    padding:1px;

    background:
    linear-gradient(
        135deg,
        rgba(114,255,159,.35),
        transparent,
        rgba(114,255,159,.2)
    );

    -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;

    pointer-events:none;
}

/* BADGE */

.badge{

    display:inline-flex;

    align-items:center;
    gap:10px;

    padding:
    12px 22px;

    border-radius:999px;

    background:
    rgba(255,255,255,.03);

    border:
    1px solid rgba(114,255,159,.08);

    color:#c7ffd7;

    font-size:14px;

    margin-bottom:38px;
}

.dot{
    width:8px;
    height:8px;

    border-radius:50%;

    background:#72ff9f;

    box-shadow:
    0 0 15px #72ff9f;
}

/* TITLE */

h1{

    font-size:
    clamp(48px, 8vw, 108px);

    line-height:.95;

    letter-spacing:-5px;

    margin-bottom:30px;

    word-break:break-word;

    overflow-wrap:break-word;

    background:
    linear-gradient(
        90deg,
        #ffffff 0%,
        #f4fff7 25%,
        #91ffb4 50%,
        #ffffff 75%
    );

    background-size:200% auto;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:shine 8s linear infinite;
}

@keyframes shine{

    from{
        background-position:0% center;
    }

    to{
        background-position:200% center;
    }

}

/* DESCRIPTION */

.desc{

    font-size:
    clamp(18px,2vw,24px);

    line-height:1.5;

    color:#8d9d91;

    margin-bottom:45px;
}

.desc span{
    color:#7effa7;
}

/* BUTTON */

button{

    position:relative;

    width:100%;

    padding:
    28px;

    border-radius:28px;

    border:
    1px solid rgba(114,255,159,.45);

    background:
    rgba(0,0,0,.28);

    color:#92ffb6;

    font-size:
    clamp(24px,2vw,34px);

    font-weight:700;

    cursor:pointer;

    overflow:hidden;

    transition:.25s ease;

    box-shadow:
    0 0 40px rgba(114,255,159,.12),
    inset 0 0 20px rgba(114,255,159,.04);
}

button::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.08),
        transparent
    );

    transform:
    translateX(-100%);

    transition:.6s;
}

button:hover::before{

    transform:
    translateX(100%);
}

button:hover{

    transform:
    translateY(-2px)
    scale(1.01);

    border-color:
    rgba(114,255,159,.75);

    box-shadow:
    0 0 70px rgba(114,255,159,.22),
    0 15px 40px rgba(0,0,0,.4);
}

/* FOOTER */

.footer{

    margin-top:36px;

    color:#65746a;

    font-size:20px;
}

/* MOBILE */

@media(max-width:700px){

    .card{
        padding:35px 22px;
    }

    h1{
        letter-spacing:-2px;
    }

}

</style>
</head>
