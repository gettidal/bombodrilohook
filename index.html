<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bombdrilo Hook</title>

<meta name="theme-color" content="#000000">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:radial-gradient(circle at top,#111,#000);
    font-family:Arial, Helvetica, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

.container{
    position:relative;
    z-index:2;

    width:420px;

    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);

    backdrop-filter:blur(20px);

    border-radius:24px;

    padding:40px;

    text-align:center;

    box-shadow:
    0 0 40px rgba(255,255,255,0.05),
    0 0 120px rgba(255,255,255,0.03);
}

.logo{
    font-size:52px;
    font-weight:900;

    letter-spacing:2px;

    margin-bottom:10px;

    background:linear-gradient(to right,#ffffff,#999999);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.sub{
    color:#9d9d9d;
    margin-bottom:35px;
    font-size:15px;
}

button{
    width:100%;
    padding:18px;

    border:none;
    border-radius:16px;

    background:linear-gradient(135deg,#ffffff,#8f8f8f);

    color:black;

    font-size:18px;
    font-weight:700;

    cursor:pointer;

    transition:0.25s;

    box-shadow:
    0 0 25px rgba(255,255,255,0.15);
}

button:hover{
    transform:translateY(-3px) scale(1.02);

    box-shadow:
    0 0 40px rgba(255,255,255,0.35);
}

.footer{
    margin-top:25px;
    color:#666;
    font-size:12px;
}

.glow{
    position:absolute;
    width:500px;
    height:500px;

    background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 70%);

    filter:blur(50px);

    z-index:1;
}

.glow1{
    top:-200px;
    left:-200px;
}

.glow2{
    bottom:-200px;
    right:-200px;
}
</style>
</head>

<body>

<canvas id="snow"></canvas>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="container">

    <div class="logo">
        Bombdrilo Hook
    </div>

    <div class="sub">
        premium scripting utility
    </div>

    <button id="buy-btn">
        enter
    </button>

    <div class="footer">
        bombdrilo.online
    </div>

</div>

<script src="script.js"></script>

<script>
const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const snowflakes = [];

for(let i = 0; i < 200; i++){
    snowflakes.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*4+1,
        d:Math.random()*1
    });
}

function drawSnow(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";
    ctx.beginPath();

    for(let i = 0; i < snowflakes.length; i++){
        const f = snowflakes[i];

        ctx.moveTo(f.x,f.y);
        ctx.arc(f.x,f.y,f.r,0,Math.PI*2,true);
    }

    ctx.fill();

    moveSnow();
}

let angle = 0;

function moveSnow(){
    angle += 0.01;

    for(let i = 0; i < snowflakes.length; i++){
        const f = snowflakes[i];

        f.y += Math.cos(angle + f.d) + 1 + f.r/2;
        f.x += Math.sin(angle) * 2;

        if(f.x > canvas.width + 5 || f.x < -5 || f.y > canvas.height){
            snowflakes[i] = {
                x:Math.random()*canvas.width,
                y:-10,
                r:f.r,
                d:f.d
            };
        }
    }
}

setInterval(drawSnow,33);

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
