<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>bombdrilo.hook</title>

<meta name="theme-color" content="#08110a">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;

    font-family:
    Inter,
    Arial,
    sans-serif;

    color:white;

    background:
    radial-gradient(circle at top left, rgba(91,255,143,.12), transparent 30%),
    radial-gradient(circle at bottom right, rgba(133,255,172,.08), transparent 35%),
    linear-gradient(135deg,#020503,#07110a,#000000);
}

/* GRID */

.grid{
    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);

    background-size:42px 42px;

    mask-image:
    radial-gradient(circle, black, transparent 80%);
}

/* ORBS */

.orb{
    position:fixed;

    width:400px;
    height:400px;

    border-radius:50%;

    filter:blur(90px);

    opacity:.25;

    animation:float 8s ease-in-out infinite alternate;
}

.orb.one{
    background:#4dff88;

    top:-120px;
    left:-100px;
}

.orb.two{
    background:#98ffb7;

    bottom:-140px;
    right:-100px;

    animation-delay:2s;
}

@keyframes float{
    from{
        transform:
        translateY(0px)
        scale(1);
    }

    to{
        transform:
        translateY(45px)
        scale(1.1);
    }
}

/* SNOW */

.snow{
    position:fixed;
    inset:0;

    overflow:hidden;

    pointer-events:none;
}

.snow span{
    position:absolute;

    width:4px;
    height:4px;

    background:#d8ffe4;

    border-radius:50%;

    opacity:.8;

    filter:
    drop-shadow(0 0 8px #89ffab);

    animation:fall linear infinite;
}

@keyframes fall{
    0%{
        transform:
        translateY(-10vh)
        translateX(0px);

        opacity:0;
    }

    10%{
        opacity:.9;
    }

    100%{
        transform:
        translateY(110vh)
        translateX(60px);

        opacity:0;
    }
}

/* MAIN */

.wrap{
    position:relative;
    z-index:5;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

/* CARD */

.card{
    width:min(92vw, 500px);

    padding:
    clamp(28px,4vw,42px);

    border-radius:32px;

    text-align:center;

    background:
    rgba(255,255,255,.05);

    border:
    1px solid rgba(255,255,255,.08);

    backdrop-filter:
    blur(24px);

    box-shadow:
    0 30px 90px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,255,255,.1);
}

/* BADGE */

.badge{
    display:inline-flex;

    align-items:center;
    gap:8px;

    padding:
    9px 14px;

    border-radius:999px;

    background:
    rgba(255,255,255,.06);

    border:
    1px solid rgba(255,255,255,.08);

    color:#b9ffcd;

    font-size:12px;

    margin-bottom:22px;
}

.dot{
    width:7px;
    height:7px;

    border-radius:50%;

    background:#61ff92;

    box-shadow:
    0 0 14px #61ff92;
}

/* TITLE */

h1{
    font-size:
    clamp(42px, 8vw, 72px);

    line-height:.92;

    letter-spacing:
    -3px;

    margin-bottom:18px;

    background:
    linear-gradient(
        90deg,
        #ffffff,
        #8dffb2,
        #ffffff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* DESCRIPTION */

p{
    color:#9db5a5;

    font-size:
    clamp(14px,2vw,16px);

    line-height:1.6;

    margin-bottom:30px;
}

/* BUTTON */

button{
    width:100%;

    border:none;

    border-radius:18px;

    padding:
    18px 20px;

    cursor:pointer;

    font-size:17px;
    font-weight:900;

    color:#041108;

    background:
    linear-gradient(
        135deg,
        #a8ffbf,
        #5eff8e
    );

    box-shadow:
    0 0 35px rgba(94,255,142,.35),
    inset 0 1px 0 rgba(255,255,255,.7);

    transition:.22s ease;
}

button:hover{
    transform:
    translateY(-3px)
    scale(1.02);

    box-shadow:
    0 0 60px rgba(94,255,142,.5),
    0 15px 35px rgba(0,0,0,.4);
}

/* FOOTER */

.footer{
    margin-top:20px;

    color:#587261;

    font-size:12px;
}

</style>
</head>

<body>

<div class="grid"></div>

<div class="orb one"></div>
<div class="orb two"></div>

<div class="snow">
    <span style="left:5%; animation-duration:9s;"></span>
    <span style="left:15%; animation-duration:12s; animation-delay:1s;"></span>
    <span style="left:25%; animation-duration:10s; animation-delay:2s;"></span>
    <span style="left:35%; animation-duration:14s;"></span>
    <span style="left:45%; animation-duration:11s; animation-delay:3s;"></span>
    <span style="left:55%; animation-duration:13s;"></span>
    <span style="left:65%; animation-duration:9s; animation-delay:1s;"></span>
    <span style="left:75%; animation-duration:15s;"></span>
    <span style="left:85%; animation-duration:12s; animation-delay:2s;"></span>
    <span style="left:95%; animation-duration:10s;"></span>
</div>

<div class="wrap">

    <div class="card">

        <div class="badge">
            <div class="dot"></div>
            secure access
        </div>

        <h1>
            bombdrilo.hook
        </h1>

        <p>
            premium fallen script<br>
            by the owners of NHACK
        </p>

        <button id="buy-btn">
            launch
        </button>

        <div class="footer">
            bombardino.online
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
