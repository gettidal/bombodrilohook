<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>bombdrilo.hook</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --green1:#d8ffe2;
    --green2:#b6ffc8;
    --green3:#78ff9d;
    --green4:#46ff7f;
}

body{

    overflow:hidden;
    height:100vh;

    font-family:
    Inter,
    Arial,
    sans-serif;

    background:
    radial-gradient(circle at top left, rgba(70,255,127,.08), transparent 25%),
    radial-gradient(circle at bottom right, rgba(70,255,127,.06), transparent 25%),
    #020403;

    color:white;
}

/* GRID */

.grid{

    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(70,255,127,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(70,255,127,.02) 1px, transparent 1px);

    background-size:42px 42px;

    mask-image:
    radial-gradient(circle, black, transparent 80%);
}

/* MOUSE EFFECT */

.mouse{

    position:fixed;

    width:700px;
    height:700px;

    border-radius:50%;

    pointer-events:none;

    background:
    radial-gradient(circle,
    rgba(70,255,127,.05),
    transparent 65%);

    transform:
    translate(-50%, -50%);

    filter:blur(35px);

    z-index:0;
}

/* FLOATERS */

.glow{

    position:fixed;

    width:450px;
    height:450px;

    border-radius:50%;

    filter:blur(120px);

    opacity:.07;

    animation:float 10s infinite alternate ease-in-out;
}

.glow.left{

    top:-120px;
    left:-120px;

    background:#46ff7f;
}

.glow.right{

    bottom:-120px;
    right:-120px;

    background:#46ff7f;

    animation-delay:2s;
}

@keyframes float{

    from{
        transform:
        translateY(0px)
        scale(1);
    }

    to{
        transform:
        translateY(40px)
        scale(1.08);
    }

}

/* PARTICLES */

.particles{

    position:fixed;
    inset:0;

    overflow:hidden;

    pointer-events:none;
}

.particles span{

    position:absolute;

    width:3px;
    height:3px;

    border-radius:50%;

    background:#eaffef;

    opacity:.6;

    box-shadow:
    0 0 10px #46ff7f;

    animation:fall linear infinite;
}

@keyframes fall{

    0%{
        transform:
        translateY(-10vh)
        translateX(0px);

        opacity:0;
    }

    10%{
        opacity:.65;
    }

    100%{
        transform:
        translateY(110vh)
        translateX(40px);

        opacity:0;
    }

}

/* MAIN */

.wrap{

    position:relative;
    z-index:5;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:35px;
}

/* CARD */

.card{

    position:relative;

    width:min(88vw, 1050px);

    padding:
    clamp(45px,5vw,75px);

    border-radius:40px;

    text-align:center;

    background:
    rgba(4,10,6,.72);

    border:
    1px solid rgba(70,255,127,.06);

    backdrop-filter:
    blur(28px);

    box-shadow:
    0 0 90px rgba(0,0,0,.72),
    inset 0 1px 0 rgba(255,255,255,.02);

    overflow:hidden;
}

/* OUTLINE */

.card::before{

    content:"";

    position:absolute;
    inset:0;

    border-radius:inherit;

    padding:1px;

    background:
    linear-gradient(
        135deg,
        rgba(70,255,127,.14),
        transparent,
        rgba(70,255,127,.08)
    );

    -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;

    pointer-events:none;
}

/* BADGE */

.badge{

    display:inline-flex;

    align-items:center;
    gap:10px;

    padding:
    12px 22px;

    border-radius:999px;

    background:
    rgba(255,255,255,.02);

    border:
    1px solid rgba(70,255,127,.05);

    color:#eaffef;

    font-size:14px;

    margin-bottom:50px;
}

.dot{

    width:8px;
    height:8px;

    border-radius:50%;

    background:#46ff7f;

    box-shadow:
    0 0 14px #46ff7f;
}

/* TITLE */

h1{

    font-size:
    clamp(48px, 6.4vw, 102px);

    line-height:.92;

    letter-spacing:-5px;

    margin-bottom:38px;

    font-weight:800;

    word-break:break-word;

    overflow-wrap:anywhere;

    background:
    linear-gradient(
        90deg,
        #ffffff 0%,
        #eaffef 18%,
        #c5ffd4 35%,
        #8cffaa 50%,
        #c5ffd4 65%,
        #ffffff 100%
    );

    background-size:250% auto;

    animation:
    gradientMove 8s linear infinite;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 25px rgba(70,255,127,.04);
}

@keyframes gradientMove{

    0%{
        background-position:0% center;
    }

    100%{
        background-position:250% center;
    }

}

/* DESC */

.desc{

    font-size:
    clamp(18px,1.7vw,24px);

    line-height:1.55;

    color:#86938a;

    margin-bottom:55px;
}

.desc span{
    color:#57ff8c;
}

/* BUTTON */

button{

    width:100%;

    padding:
    28px;

    border-radius:28px;

    border:
    1px solid rgba(70,255,127,.28);

    background:
    rgba(0,0,0,.18);

    color:#8fffb0;

    font-size:
    clamp(24px,2vw,34px);

    font-weight:700;

    cursor:pointer;

    transition:.25s ease;

    box-shadow:
    0 0 40px rgba(70,255,127,.08),
    inset 0 0 18px rgba(70,255,127,.02);
}

button:hover{

    transform:
    translateY(-2px)
    scale(1.01);

    border-color:
    rgba(70,255,127,.52);

    box-shadow:
    0 0 70px rgba(70,255,127,.16),
    0 15px 40px rgba(0,0,0,.4);
}

/* FOOTER */

.footer{

    margin-top:36px;

    color:#59655d;

    font-size:18px;
}

/* MOBILE */

@media(max-width:700px){

    .card{
        padding:38px 22px;
    }

    h1{
        letter-spacing:-2px;
    }

}

</style>
</head>
