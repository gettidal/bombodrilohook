<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bombdrilo.hook</title>
<meta name="theme-color" content="#050505">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  overflow: hidden;
  font-family: Inter, Arial, sans-serif;
  color: white;
  background:
    radial-gradient(circle at 20% 15%, rgba(120,120,255,.22), transparent 35%),
    radial-gradient(circle at 80% 85%, rgba(255,255,255,.12), transparent 35%),
    linear-gradient(135deg, #020202, #080810 45%, #000);
}

.grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(circle, black, transparent 72%);
}

.orb {
  position: fixed;
  width: 360px;
  height: 360px;
  border-radius: 50%;
  filter: blur(60px);
  opacity: .45;
  animation: float 7s infinite alternate ease-in-out;
}

.orb.one {
  top: -90px;
  left: -80px;
  background: #6b6bff;
}

.orb.two {
  bottom: -120px;
  right: -90px;
  background: #ffffff;
  animation-delay: 1.5s;
}

@keyframes float {
  from { transform: translateY(0) scale(1); }
  to { transform: translateY(35px) scale(1.12); }
}

.snow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.snow span {
  position: absolute;
  top: -20px;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  opacity: .75;
  animation: fall linear infinite;
  filter: drop-shadow(0 0 6px white);
}

@keyframes fall {
  0% {
    transform: translateY(-10vh) translateX(0);
    opacity: 0;
  }
  10% {
    opacity: .85;
  }
  100% {
    transform: translateY(110vh) translateX(80px);
    opacity: 0;
  }
}

.wrap {
  position: relative;
  z-index: 5;
  height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
}

.card {
  width: min(440px, 92vw);
  padding: 36px;
  border-radius: 28px;
  text-align: center;
  background: rgba(255,255,255,.065);
  border: 1px solid rgba(255,255,255,.14);
  backdrop-filter: blur(22px);
  box-shadow:
    0 25px 80px rgba(0,0,0,.65),
    inset 0 1px 0 rgba(255,255,255,.18);
}

.badge {
  display: inline-flex;
  gap: 8px;
  align-items: center;
  padding: 8px 13px;
  border-radius: 999px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  color: #cfcfff;
  font-size: 12px;
  margin-bottom: 18px;
}

.dot {
  width: 7px;
  height: 7px;
  background: #8f8fff;
  border-radius: 50%;
  box-shadow: 0 0 15px #8f8fff;
}

h1 {
  font-size: clamp(38px, 8vw, 58px);
  line-height: .95;
  letter-spacing: -2px;
  margin-bottom: 14px;
  background: linear-gradient(90deg, #fff, #bfc0ff, #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

p {
  color: #aaa;
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 28px;
}

button {
  width: 100%;
  border: 0;
  border-radius: 18px;
  padding: 18px 20px;
  cursor: pointer;
  color: #050505;
  font-weight: 900;
  font-size: 17px;
  letter-spacing: .4px;
  background: linear-gradient(135deg, #fff, #bfc0ff);
  box-shadow:
    0 0 30px rgba(191,192,255,.35),
    inset 0 1px 0 rgba(255,255,255,.9);
  transition: .2s ease;
}

button:hover {
  transform: translateY(-3px) scale(1.015);
  box-shadow:
    0 0 50px rgba(191,192,255,.55),
    0 12px 35px rgba(0,0,0,.4);
}

.footer {
  margin-top: 18px;
  color: #666;
  font-size: 12px;
}
</style>
</head>

<body>
<div class="grid"></div>
<div class="orb one"></div>
<div class="orb two"></div>

<div class="snow">
  <span style="left:4%; animation-duration:9s; animation-delay:0s;"></span>
  <span style="left:12%; animation-duration:12s; animation-delay:1s;"></span>
  <span style="left:21%; animation-duration:10s; animation-delay:2s;"></span>
  <span style="left:31%; animation-duration:14s; animation-delay:.5s;"></span>
  <span style="left:43%; animation-duration:11s; animation-delay:3s;"></span>
  <span style="left:56%; animation-duration:13s; animation-delay:1.5s;"></span>
  <span style="left:67%; animation-duration:9s; animation-delay:2.5s;"></span>
  <span style="left:78%; animation-duration:15s; animation-delay:.2s;"></span>
  <span style="left:88%; animation-duration:12s; animation-delay:4s;"></span>
  <span style="left:96%; animation-duration:10s; animation-delay:1.2s;"></span>
</div>

<main class="wrap">
  <section class="card">
    <div class="badge">
      <span class="dot"></span>
      private access
    </div>

    <h1>bombdrilo.hook</h1>

    <p>
      advanced utility interface with smooth visuals,
      clean effects, and premium styling.
    </p>

    <button id="buy-btn">launch</button>

    <div class="footer">bombardino.online</div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
